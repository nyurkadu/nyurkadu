name: CI

on:
  push:
  workflow_dispatch:

jobs:
  job-one:
    runs-on: ubuntu-latest
    steps:
      - run: echo "data" > file.txt
      - uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: file.txt

  job-two:
    runs-on: ubuntu-latest
    needs: job-one # This forces job-two to wait for job-one
    steps:
      - run: echo "Done"
